  <style>
    .post-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }
    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 13.5px;
      color: rgb(16, 69, 202);
      text-decoration: none;
      margin-bottom: 36px;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .post-back:hover { border-bottom-color: #ffab40; color: rgb(16, 69, 202); }
    .post-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #bbb;
      margin-bottom: 12px;
    }
    .post-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2.4rem;
      font-weight: 200;
      color: #1a1a1a;
      margin: 0 0 32px;
      line-height: 1.2;
    }
    .post-divider {
      border: none;
      border-top: 5px solid #24305e;
      width: 48px;
      margin: 0 0 36px;
    }
    .post-body {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1.05rem;
      line-height: 1.85;
      color: #333;
    }
    .post-body p { margin-bottom: 1.4em; }
    .post-body h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 300;
      margin: 2em 0 0.6em;
      color: #1a1a1a;
    }
    .post-body blockquote {
      border-left: 4px solid #24305e;
      background: #f5f7ff;
      padding: 16px 20px;
      margin: 0 0 1.4em;
      border-radius: 0 4px 4px 0;
      color: #444;
      font-style: italic;
    }
    .post-body pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 20px 24px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.4em;
    }
    .post-body img {
      display: block;
      max-width: 100%;
      margin: 28px auto;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
  </style>

  <main style="padding-left:0;">
